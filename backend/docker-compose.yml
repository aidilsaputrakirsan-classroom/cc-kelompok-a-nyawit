services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: it_asset_api
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////data/it_asset.db
      APP_ENV: development
      SECRET_KEY: your-super-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - sqlite_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  sqlite_data:
